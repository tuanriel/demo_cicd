# ─────────────────────────────────────────────────────────────────────────────
# Hạ tầng demo — CHẠY ĐỘC LẬP, KHÔNG gộp với cicd-platform, KHÔNG recreate
# container backend nào:
#
#     docker compose -f docker-compose.demo.yml up -d
#
# nginx phục vụ nội dung mà pipeline đã build sẵn vào volume `jenkins_data`
# (mount READ-ONLY — chỉ đọc, không tác động tới Jenkins). Pipeline ghi build
# ra $HOME/published/orbit-store bên trong jenkins_home (xem deploy.yml);
# nginx đọc ở /jenkins/published/orbit-store.
#
# Liên kết DUY NHẤT với cicd-platform: dùng chung volume jenkins_data (read-only).
# ─────────────────────────────────────────────────────────────────────────────

services:
  web:
    image: nginx:alpine
    container_name: orbit-demo-web
    ports:
      - "8082:80"          # host nginx (demo.orbitai.vn) proxy vào cổng này
    volumes:
      - jenkins_data:/jenkins:ro
      - ./nginx-demo.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  jenkins_data:
    external: true
    # ⚠️ Tên volume THẬT trên VPS — kiểm tra bằng:  docker volume ls | grep jenkins
    # Compose thường prefix theo tên thư mục dự án, nên hay là:
    name: cicd-platform_jenkins_data
