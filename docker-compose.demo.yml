# ─────────────────────────────────────────────────────────────────────────────
# Hạ tầng RIÊNG cho demo — KHÔNG nằm trong cicd-platform.
#
# File này là compose OVERRIDE: gộp cùng docker-compose.yml của cicd-platform
# lúc deploy, KHÔNG sửa file gốc. Nó làm 2 việc:
#   1. Thêm service `web` (nginx) phục vụ site tĩnh tại /srv/demo-site.
#   2. Gắn thêm 1 volume /srv/demo-site vào container `jenkins` sẵn có, để
#      step `sh` trong pipeline copy file ra được (đây là "cầu nối" duy nhất
#      giữa Jenkins và nginx — bản thân logic deploy vẫn nằm trong workflow).
#
# CÁCH DEPLOY (trên VPS, tại thư mục cicd-platform):
#   # chuẩn bị web root 1 lần, cho phép user jenkins (uid 1000) ghi:
#   sudo mkdir -p /srv/demo-site && sudo chown 1000:1000 /srv/demo-site
#   echo '<h1>Cho deploy...</h1>' | sudo tee /srv/demo-site/index.html
#
#   # gộp 2 file compose rồi up (base giữ nguyên, override thêm demo):
#   docker compose -f docker-compose.yml -f ../demo-site/docker-compose.demo.yml up -d
#
# Sau đó trỏ demo.orbitai.vn → cổng 8082 của VPS (Cloudflare/reverse-proxy,
# giống hệt cách bạn đã làm cho apicicd.orbitai.vn).
# ─────────────────────────────────────────────────────────────────────────────

services:
  # Gắn thêm web root vào container jenkins CÓ SẴN (compose merge volumes).
  jenkins:
    volumes:
      - /srv/demo-site:/srv/demo

  # nginx phục vụ site tĩnh — hạ tầng của demo, độc lập với backend.
  web:
    image: nginx:alpine
    container_name: cicd-demo-web
    ports:
      - "8082:80"
    volumes:
      - /srv/demo-site:/usr/share/nginx/html:ro
    networks:
      - cicd_net
    restart: unless-stopped
