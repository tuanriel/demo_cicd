# Pipeline build + deploy app React (Vite) — TOÀN BỘ nằm trong workflow,
# không đụng gì tới project cicd-platform, không sửa image Jenkins.
#
# Vì image Jenkins compose không có Node, step build tự tải Node (bản portable,
# CACHE trong $HOME nên chỉ tải 1 lần) rồi chạy `npm ci && npm run build`.
# Sau đó publish dist/ ra $HOME/published/orbit-store (trong jenkins_home) —
# nginx demo (compose riêng) mount volume jenkins_data read-only và phục vụ
# thư mục này tại demo.orbitai.vn. KHÔNG mount ngược vào Jenkins.
#
# ⚠️ runner: built-in — KHÔNG dùng "jenkins-jenkins-agent" (label k8s, bản
#    compose không có → build treo hàng đợi).
runner: built-in

trigger:
  push:
    branches:
      - main

stages:
  - name: Checkout
    steps:
      - gitCheckout:

  - name: Build & Deploy
    steps:
      - sh: |
          set -e
          NODE_VER=v20.13.1
          NODE_DIR="$HOME/.node/$NODE_VER"

          # 1) Node portable, cache trong $HOME (jenkins_home) — chỉ tải lần đầu.
          if [ ! -x "$NODE_DIR/bin/node" ]; then
            echo "== Tai Node $NODE_VER (lan dau) =="
            mkdir -p "$NODE_DIR"
            curl -fsSL "https://nodejs.org/dist/$NODE_VER/node-$NODE_VER-linux-x64.tar.gz" -o /tmp/node.tgz
            tar -xzf /tmp/node.tgz -C "$NODE_DIR" --strip-components=1
            rm -f /tmp/node.tgz
          fi
          export PATH="$NODE_DIR/bin:$PATH"
          echo "node $(node -v) / npm $(npm -v)"

          # 2) Cai dependency + build React.
          echo "== npm ci =="
          npm ci --no-audit --no-fund
          echo "== npm run build =="
          npm run build

          # 3) Publish: dua dist/ vao thu muc ON DINH trong jenkins_home, roi
          #    doi ten (mv cung filesystem = atomic) de nginx demo doc duoc.
          #    Khong phu thuoc /srv/demo, khong mount nguoc vao Jenkins.
          PUB="$HOME/published/orbit-store"
          rm -rf "$PUB.new"
          mkdir -p "$PUB.new"
          cp -a dist/. "$PUB.new/"
          rm -rf "$PUB"
          mv "$PUB.new" "$PUB"
          echo "== Published to $PUB =="
          ls -la "$PUB"

finally:
  # Dung block scalar (|) — KHONG viet "- sh: echo ...#..." inline, vi trong YAML
  # dau " #" (space + hash) bat dau COMMENT -> cat cut chuoi -> nginx/dash bao
  # "unterminated quoted string". Trong block scalar thi # la ky tu thuong.
  - sh: |
      echo "Pipeline done: build $BUILD_NUMBER $BUILD_URL"
