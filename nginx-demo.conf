# nginx phục vụ site tĩnh đã build (SPA React → try_files fallback về index.html).
# root trỏ vào thư mục pipeline publish trong volume jenkins_data (mount ro).
server {
    listen 80;
    root /jenkins/published/orbit-store;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
